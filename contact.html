<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Brew Haven</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="index.html" class="logo">Brew<span>Haven</span></a>
      <nav class="navbar">
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="gallery.html">Gallery</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <div class="hamburger">
          <span></span><span></span><span></span>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Get in Touch</h1>
        <p>We’d love to hear from you</p>
      </div>
    </section>

    <section class="contact-info-section">
      <div class="container contact-grid">
        <div class="contact-details">
          <div class="contact-card">
            <i class="fas fa-map-marker-alt"></i>
            <h3>Address</h3>
            <p>42 Coffee Lane, Brewtown, BT 1001</p>
          </div>
          <div class="contact-card">
            <i class="fas fa-phone-alt"></i>
            <h3>Call Us</h3>
            <p>+91 98765 43210</p>
          </div>
          <div class="contact-card">
            <i class="fab fa-instagram"></i>
            <h3>Instagram</h3>
            <p>@brewhaven</p>
            <a href="#" class="btn-outline small">Follow us</a>
          </div>
        </div>
        <div class="map-container">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509402!2d144.95373531531696!3d-37.81627944202138!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0f11fd81%3A0xf5778a6d6c7b4b5c!2sFederation%20Square!5e0!3m2!1sen!2sau!4v1610000000000!5m2!1sen!2sau" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-container">
      <p>© 2025 Brew Haven – Premium Coffee Experience</p>
      <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
