<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Brew Haven</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <header class="header">
    <div class="container header-container">
      <a href="index.html" class="logo">Brew<span>Haven</span></a>
      <nav class="navbar">
        <ul class="nav-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="gallery.html" class="active">Gallery</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger">
          <span></span><span></span><span></span>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>Moments in Focus</h1>
        <p>Experience the vibe of Brew Haven</p>
      </div>
    </section>

    <section class="gallery-grid-section">
      <div class="container">
        <div class="gallery-grid">
          <div class="gallery-item">
            <img src="images/gallery1.jpg" alt="Coffee pour">
          </div>
          <div class="gallery-item">
            <img src="images/gallery2.jpg" alt="Interior seating">
          </div>
          <div class="gallery-item">
            <img src="images/gallery3.jpg" alt="Latte art">
          </div>
          <div class="gallery-item">
            <img src="images/gallery4.jpg" alt="Pastry display">
          </div>
          <div class="gallery-item">
            <img src="images/gallery5.jpg" alt="Barista at work">
          </div>
          <div class="gallery-item">
            <img src="images/gallery6.jpg" alt="Cozy corner">
          </div>
        </div>
      </div>
    </section>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
      <span class="close-lightbox">&times;</span>
      <img class="lightbox-content" id="lightbox-img">
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-container">
      <p>© 2025 Brew Haven – Premium Coffee Experience</p>
      <div class="social-icons">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-facebook-f"></i></a>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
